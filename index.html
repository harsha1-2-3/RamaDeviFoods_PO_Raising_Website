          <div className="border-b border-slate-200 pb-4 mb-4">
            <h2 className="text-xl font-black tracking-tight">Purchase Order Repository</h2>
            <p className="text-slate-500 text-sm mt-0.5">View, download, or manage previously generated purchase orders.</p>
          </div>

          {isLoading ? (
            <div className="text-center py-12 text-slate-400 font-medium text-sm flex flex-col items-center justify-center gap-2">
              <div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin" />
              Loading purchase orders...
            </div>
          ) : orderHistory.length === 0 ? (
            <div className="text-center py-14 text-slate-400 font-semibold text-sm border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50/50">No saved orders found in the central cloud server.</div>
          ) : (
            <div className="overflow-x-auto rounded-2xl border border-slate-300 shadow-sm">
              <table className="w-full text-left text-sm border-collapse bg-white">
                <thead>
                  <tr className="bg-slate-900 text-white uppercase text-[10px] tracking-wider font-extrabold border-b border-slate-300">
                    <th className="p-4">PO Reference</th>
                    <th className="p-4">Issue Date</th>
                    <th className="p-4">Material Category</th>
                    <th className="p-4">Supplier</th>
                    <th className="p-4 text-right">Order Value</th>
                    <th className="p-4 text-center">Actions</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-200">
                  {orderHistory.map((log, index) => (
                    <tr key={log.uniqueTimestamp || index} className="hover:bg-slate-50 transition-colors">
                      <td className="p-4 font-mono font-black text-slate-900 text-left">{log.poNum || ''}</td>
                      <td className="p-4 text-slate-500 font-semibold text-xs text-left">{log.date || ''}</td>
                      <td className="p-4 text-left">
                        <span className={`font-black text-[10px] px-3 py-1 rounded-full border tracking-wide uppercase shadow-sm ${
                          log.category === 'Podis' ? 'bg-podiRed-50 border-podiRed-100 text-podiRed-700' :
                          log.category === 'Snacks' ? 'bg-snackGold-50 border-snackGold-100 text-snackGold-700' :
                          'bg-blue-50 border-blue-100 text-blue-700'
                        }`}>
                          {log.category || ''}
                        </span>
                      </td>
                      <td className="p-4 text-slate-700 text-xs font-bold max-w-xs truncate text-left">{log.vendorName || ''}</td>
                      <td className="p-4 text-right font-mono font-black text-slate-900">₹{formatIndianCurrency(log.total || 0)}</td>
                      <td className="p-4 text-center space-x-2 whitespace-nowrap">
                        <button onClick={() => downloadSavedPdfFromLog(log)} className="bg-slate-900 hover:bg-slate-800 text-white text-xs font-black px-3.5 py-1.5 rounded-xl shadow-sm transform active:scale-95 transition-all">📥 PDF</button>
                        <button onClick={() => deleteOrder(log.supabaseRowId)} className="bg-gradient-to-r from-rose-600 to-red-600 text-white text-xs font-black px-3.5 py-1.5 rounded-xl shadow-sm transform active:scale-95 transition-all">🗑 Delete</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
