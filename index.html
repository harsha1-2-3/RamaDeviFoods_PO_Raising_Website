<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Package Pouches Order Module</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f1f5f9;
    }
    .pdf-preview-sheet {
      width: 210mm;
      height: 297mm;
      box-sizing: border-box;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin: 0 auto;
    }
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// Precise structural definitions matching your explicit distribution networks
const ADDRESS_SPECTAL = {
  name: "SPECTAL DIGI PRINT PVT LTD",
  details: "No 274/D, Phase II, KIADB, Bommasandra Industrial Area, Hosur Rd",
  city: "Bangalore, Karnataka, India, 560099",
  gst: "29AALCC7356H1Z6",
  state: "Karnataka, Code : 29",
  email: "accounts@spectalpack.com"
};

const ADDRESS_NEHA = {
  name: "Neha Infotech",
  details: "16-1 3rd Floor, 2nd Cross Pemmagowda street, JC Nagar, Mr Palya",
  city: "Bengaluru Urban, Bengaluru - 560006, Karnataka, India",
  gst: "29FWIPK1279N1ZP",
  state: "Karnataka, Code : 29",
  email: "nehainfotechblr@gmail.com"
};

const DELIVERY_RAMADEVI = {
  name: "Ramadevi Foods",
  details: "D.NO.4/494, Shed No 2, Sy No.256-1, Kalavakatta Road, Gopavaram Panchayat",
  city: "Proddatur Kadapa district, Andhra Pradesh, 516360",
  email: "Support@rdpfoodproducts.com",
  phone: "8897645414",
  gst: "37AAMCR9272N1ZD",
  state: "Andhra Pradesh Code: 37"
};

// Item catalog populated with fixed custom pricing architecture
const INVENTORY = {
  Podis: [
    { id: 1, name: "Peanut garlic podi", desc: "Printed Pouches For Podis", rate: 6.00 },
    { id: 2, name: "Gun powder", desc: "Printed Pouches For Podis", rate: 6.00 },
    { id: 3, name: "Moringa podi", desc: "Printed Pouches For Podis", rate: 6.00 },
    { id: 4, name: "Idli karam podi", desc: "Printed Pouches For Podis", rate: 6.00 },
    { id: 5, name: "Curry leaf podi", desc: "Printed Pouches For Podis", rate: 6.00 }
  ],
  Snacks: [
    { id: 6, name: "Karam gavvalu", desc: "Printed Pouches Small 100gm (120 x 210)", rate: 6.95 },
    { id: 7, name: "Sweet gavvalu", desc: "Printed Pouches Small 100gm (120 x 210)", rate: 6.95 },
    { id: 8, name: "Vam karalu", desc: "Printed Pouches Small 100gm (120 x 210)", rate: 6.95 },
    { id: 9, name: "Chegodi", desc: "Printed Pouches Small 100gm (120 x 210)", rate: 6.95 },
    { id: 10, name: "Janthikalu", desc: "Printed Pouches Small 100gm (160 x 230)", rate: 8.95 },
    { id: 11, name: "Chekkalu", desc: "Printed Pouches Small 100gm (160 x 230)", rate: 8.95 }
  ],
  Pickles: [
    { id: 12, name: "Avakaya pickle", desc: "Printed Label 50mm*216mm (pickle Pp white Matt)", rate: 2.00 },
    { id: 13, name: "Tomato pickle", desc: "Printed Label 50mm*216mm (pickle Pp white Matt)", rate: 2.00 },
    { id: 14, name: "Gongura pickle", desc: "Printed Label 50mm*216mm (pickle Pp white Matt)", rate: 2.00 },
    { id: 15, name: "Garlic pickle", desc: "Printed Label 50mm*216mm (pickle Pp white Matt)", rate: 2.00 },
    { id: 16, name: "Ginger pickle", desc: "Printed Label 50mm*216mm (pickle Pp white Matt)", rate: 2.00 },
    { id: 17, name: "Cut mango pickle", desc: "Printed Label 50mm*216mm (pickle Pp white Matt)", rate: 2.00 }
  ]
};

function App() {
  const [screen, setScreen] = useState(1);
  const [selectedCategory, setSelectedCategory] = useState("");
  const [selectedItems, setSelectedItems] = useState([]);

  const [poNumber, setPoNumber] = useState("PO-2026-941");
  const [orderDate, setOrderDate] = useState("2026-05-28");
  const [dueDate, setDueDate] = useState("2026-06-15");
  const [gstPercentage, setGstPercentage] = useState(18);
  const logoUrl = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQAbldBpmdMcjNeT-cBnWJ0dqXckJNpwfBbDQ&s";
  
  const [orderHistory, setOrderHistory] = useState([]);

  useEffect(() => {
    const saved = localStorage.getItem("pouch_order_history");
    if (saved) {
      setOrderHistory(JSON.parse(saved));
    }
  }, []);

  // Compute the current purchaser entity based on active selection route
  const companyAddress = useMemo(() => {
    if (selectedCategory === "Pickles") {
      return ADDRESS_NEHA;
    }
    return ADDRESS_SPECTAL;
  }, [selectedCategory]);

  const handleCategoryClick = (cat) => {
    if (selectedCategory === cat) {
      setSelectedCategory("");
      setSelectedItems([]);
    } else {
      setSelectedCategory(cat);
      setSelectedItems([]);
    }
  };

  const toggleItemSelection = (item) => {
    const found = selectedItems.find(i => i.id === item.id);
    if (found) {
      setSelectedItems(selectedItems.filter(i => i.id !== item.id));
    } else {
      setSelectedItems([...selectedItems, { ...item, qty: 5000 }]);
    }
  };

  const handleLiveFieldUpdate = (id, field, val) => {
    setSelectedItems(prev => prev.map(item => 
      item.id === id ? { ...item, [field]: field === "name" || field === "desc" ? val : Number(val) } : item
    ));
  };

  const subtotalSum = useMemo(() => {
    return selectedItems.reduce((acc, item) => acc + (item.qty * item.rate), 0);
  }, [selectedItems]);

  const totalQuantitySum = useMemo(() => {
    return selectedItems.reduce((acc, item) => acc + item.qty, 0);
  }, [selectedItems]);

  const calculatedGst = subtotalSum * (gstPercentage / 100);
  const grandTotalSum = subtotalSum + calculatedGst;

  const saveBillToWebsiteDatabase = () => {
    const newRecord = {
      id: Date.now(),
      poNum: poNumber,
      date: orderDate,
      dueDate: dueDate,
      vendorName: companyAddress.name,
      total: grandTotalSum.toFixed(2),
      category: selectedCategory,
      gstPercentage: gstPercentage,
      companyProfile: { ...companyAddress }, 
      items: [...selectedItems]
    };

    const updatedHistory = [newRecord, ...orderHistory];
    setOrderHistory(updatedHistory);
    localStorage.setItem("pouch_order_history", JSON.stringify(updatedHistory));
    alert("Order metrics logged safely to history log registry!");
    setScreen(1);
  };

  const clearHistoryLog = () => {
    if (confirm("Are you sure you want to clear your local database log history?")) {
      setOrderHistory([]);
      localStorage.removeItem("pouch_order_history");
    }
  };

  const downloadSavedPdfFromLog = (logItem) => {
    const tempContainer = document.createElement("div");
    tempContainer.style.position = "absolute";
    tempContainer.style.left = "-9999px";
    tempContainer.style.top = "-9999px";

    const logItemsSubtotal = logItem.items.reduce((acc, i) => acc + (i.qty * i.rate), 0);
    const logItemsTotalQty = logItem.items.reduce((acc, i) => acc + i.qty, 0);
    const logCalculatedGst = logItemsSubtotal * (logItem.gstPercentage / 100);
    const logGrandTotal = logItemsSubtotal + logCalculatedGst;
    const resolvedCompany = logItem.companyProfile || companyAddress;

    tempContainer.innerHTML = `
      <div id="downloadable-target-node" class="pdf-preview-sheet text-slate-800 flex flex-col justify-between" style="font-family: system-ui, sans-serif; box-sizing: border-box; padding: 15mm; width: 210mm; height: 297mm; background: #fff; font-size: 12px; line-height: 1.5;">
        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; gap: 15px;">
          
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0f172a; padding-bottom: 10px;">
            <img src="${logoUrl}" alt="Company Identity" style="height: 75px; max-width: 150px; object-fit: contain;" />
            <div style="text-align: right;">
              <h1 style="margin: 0; font-size: 24px; font-weight: 900; color: #0f172a; text-transform: uppercase;">PURCHASE ORDER</h1>
              <div style="font-size: 11px; font-family: monospace; color: #64748b; margin-top: 2px;">Category: ${logItem.category} Stack</div>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px;">
            <div>
              <div style="font-size: 12px; line-height: 1.5; color: #1e293b;">
                <div><span style="font-weight: 700; color: #0f172a;">PO Reference:</span> ${logItem.poNum}</div>
                <div><span style="font-weight: 700; color: #0f172a;">Order Date:</span> ${logItem.date}</div>
                <div><span style="font-weight: 700; color: #0f172a;">Due Date:</span> ${logItem.dueDate}</div>
              </div>

              <div style="margin-top: 12px;">
                <div style="font-size: 10px; font-weight: 800; color: #1d4ed8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px;">Purchaser / Bill From:</div>
                <div style="font-weight: 700; font-size: 13px; color: #0f172a;">${resolvedCompany.name}</div>
                <div style="font-size: 11px; color: #475569; line-height: 1.4; margin-top: 2px;">
                  ${resolvedCompany.details}<br />
                  ${resolvedCompany.city}<br />
                  <strong>GSTIN/UIN:</strong> ${resolvedCompany.gst} | <strong>State:</strong> ${resolvedCompany.state}<br />
                  <strong>E-Mail:</strong> ${resolvedCompany.email}
                </div>
              </div>
            </div>

            <div style="text-align: right; box-sizing: border-box;">
              <div style="font-size: 10px; font-weight: 800; color: #047857; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px;">Deliver To:</div>
              <div style="font-weight: 700; font-size: 13px; color: #0f172a;">${DELIVERY_RAMADEVI.name}</div>
              <div style="font-size: 11px; color: #475569; line-height: 1.4; margin-top: 2px;">
                ${DELIVERY_RAMADEVI.details}<br />
                ${DELIVERY_RAMADEVI.city}<br />
                <strong>Email:</strong> ${DELIVERY_RAMADEVI.email}<br />
                <strong>Phone:</strong> ${DELIVERY_RAMADEVI.phone}<br />
                <strong>GST:</strong> ${DELIVERY_RAMADEVI.gst} | <strong>State:</strong> ${DELIVERY_RAMADEVI.state}
              </div>
            </div>
          </div>

          <div style="flex-grow: 1; margin-top: 5px;">
            <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
              <thead>
                <tr style="background-color: #0f172a; color: #ffffff; text-transform: uppercase; font-size: 10px; letter-spacing: 0.02em;">
                  <th style="padding: 10px 12px; font-weight: 700; text-align: left;">Line</th>
                  <th style="padding: 10px 12px; font-weight: 700; text-align: left;">Pouch Packaging Description</th>
                  <th style="padding: 10px 12px; font-weight: 700; text-align: right;">Quantity</th>
                  <th style="padding: 10px 12px; font-weight: 700; text-align: right;">Rate</th>
                  <th style="padding: 10px 12px; font-weight: 700; text-align: right;">Net Subtotal</th>
                </tr>
              </thead>
              <tbody>
                ${logItem.items.map((item, idx) => `
                  <tr style="border-bottom: 1px solid #e2e8f0;">
                    <td style="padding: 10px 12px; color: #64748b; font-family: monospace;">${idx + 1}</td>
                    <td style="padding: 10px 12px; color: #0f172a;"><div style="font-weight: 700;">${item.name}</div><div style="font-size: 10px; color: #64748b; margin-top: 1px;">${item.desc}</div></td>
                    <td style="padding: 10px 12px; text-align: right; font-family: monospace; font-weight: 700; color: #0f172a;">${item.qty.toLocaleString()}</td>
                    <td style="padding: 10px 12px; text-align: right; color: #475569; font-family: monospace;">₹${item.rate.toFixed(2)}</td>
                    <td style="padding: 10px 12px; text-align: right; font-family: monospace; font-weight: 700; color: #0f172a;">₹${(item.qty * item.rate).toFixed(2)}</td>
                  </tr>
                `).join('')}

                <tr style="border-top: 2px solid #0f172a; background-color: #f8fafc;">
                  <td colspan="2" style="padding: 10px 12px; font-weight: 800; text-transform: uppercase; font-size: 11px; color: #475569;">Total Quantity</td>
                  <td style="padding: 10px 12px; text-align: right; font-family: monospace; font-weight: 900; color: #0f172a; font-size: 13px;">${logItemsTotalQty.toLocaleString()}</td>
                  <td colspan="2" style="padding: 10px 12px;"></td>
                </tr>
                
                <tr>
                  <td colspan="3" style="padding: 8px 12px;"></td>
                  <td style="padding: 8px 12px; text-align: right; font-weight: 700; color: #64748b; font-size: 11px; text-transform: uppercase;">Taxable Subtotal</td>
                  <td style="padding: 8px 12px; text-align: right; font-family: monospace; font-weight: 700; color: #0f172a;">₹${logItemsSubtotal.toFixed(2)}</td>
                </tr>
                <tr>
                  <td colspan="3" style="padding: 8px 12px;"></td>
                  <td style="padding: 8px 12px; text-align: right; font-weight: 700; color: #64748b; font-size: 11px; text-transform: uppercase;">Integrated GST (${logItem.gstPercentage}%)</td>
                  <td style="padding: 8px 12px; text-align: right; font-family: monospace; font-weight: 700; color: #0f172a;">₹${logCalculatedGst.toFixed(2)}</td>
                </tr>
                <tr style="background-color: #f1f5f9;">
                  <td colspan="3" style="padding: 12px 12px; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1;"></td>
                  <td style="padding: 12px 12px; text-align: right; font-weight: 900; text-transform: uppercase; font-size: 12px; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; color: #0f172a;">Total Order Value</td>
                  <td style="padding: 12px 12px; text-align: right; font-family: monospace; font-weight: 900; font-size: 15px; color: #0f172a; border-top: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1;">
                    ₹${logGrandTotal.toFixed(2)}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; border-top: 2px dashed #cbd5e1; padding-top: 15px; align-items: flex-end;">
          <div>
            <div style="font-size: 10px; font-family: monospace; color: #94a3b8;">Generated via Spectal Digi Print System</div>
            <div style="font-size: 11px; color: #475569; font-weight: 600; margin-top: 2px;">Company Reference: ${logItem.vendorName}</div>
          </div>
          <div style="text-align: right;">
            <div style="border-top: 1px solid #0f172a; width: 180px; display: inline-block; padding-top: 5px; text-align: center; font-size: 11px; font-weight: 700; color: #1e293b;">
              Authorized Signatory
            </div>
          </div>
        </div>
      </div>
    `;

    document.body.appendChild(tempContainer);
    const targetElement = tempContainer.querySelector("#downloadable-target-node");
    
    const downloadConfiguration = {
      margin: 0,
      filename: `PO_${logItem.poNum}_${logItem.category}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().from(targetElement).set(downloadConfiguration).save().then(() => {
      document.body.removeChild(tempContainer);
    });
  };

  return (
    <div className="max-w-[1600px] mx-auto p-4 md:p-8">
      
      {/* HEADER BAR */}
      <div className="bg-slate-900 text-white p-6 rounded-2xl mb-8 flex flex-col justify-center items-center gap-2 shadow-md text-center">
        <h1 className="text-3xl font-bold tracking-tight">Package Pouches Order Module</h1>
        <p className="text-slate-400">Contextual Vendor Router Configuration Panel</p>
      </div>

      {/* SCREEN 1: CATEGORY SELECTION & LIVE CATALOG GRID */}
      {screen === 1 && (
        <div className="space-y-8 fade-in">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            {/* PODIS ROUTE SELECTION */}
            <button
              onClick={() => handleCategoryClick("Podis")}
              className={`p-6 rounded-xl border text-left transition-all ${
                selectedCategory === "Podis" 
                  ? "bg-blue-600 text-white border-blue-600 shadow-lg scale-[1.01]" 
                  : "bg-white border-slate-200 text-slate-800 hover:border-blue-400"
              }`}
            >
              <div className="text-2xl font-bold mb-1">Podis Covers</div>
              <div className={`text-xs font-semibold uppercase tracking-wider ${selectedCategory === "Podis" ? "text-blue-200" : "text-blue-600"}`}>
                Corporate: SPECTAL DIGI PRINT PVT LTD
              </div>
            </button>

            {/* SNACKS ROUTE SELECTION */}
            <button
              onClick={() => handleCategoryClick("Snacks")}
              className={`p-6 rounded-xl border text-left transition-all ${
                selectedCategory === "Snacks" 
                  ? "bg-blue-600 text-white border-blue-600 shadow-lg scale-[1.01]" 
                  : "bg-white border-slate-200 text-slate-800 hover:border-blue-400"
              }`}
            >
              <div className="text-2xl font-bold mb-1">Snacks Covers</div>
              <div className={`text-xs font-semibold uppercase tracking-wider ${selectedCategory === "Snacks" ? "text-blue-200" : "text-blue-600"}`}>
                Corporate: SPECTAL DIGI PRINT PVT LTD
              </div>
            </button>

            {/* PICKLES ROUTE SELECTION */}
            <button
              onClick={() => handleCategoryClick("Pickles")}
              className={`p-6 rounded-xl border text-left transition-all ${
                selectedCategory === "Pickles" 
                  ? "bg-blue-600 text-white border-blue-600 shadow-lg scale-[1.01]" 
                  : "bg-white border-slate-200 text-slate-800 hover:border-blue-400"
              }`}
            >
              <div className="text-2xl font-bold mb-1">Pickles Covers</div>
              <div className={`text-xs font-semibold uppercase tracking-wider ${selectedCategory === "Pickles" ? "text-blue-200" : "text-orange-600"}`}>
                Corporate: Neha Infotech
              </div>
            </button>

          </div>

          {selectedCategory && (
            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm fade-in">
              <div className="flex justify-between items-center mb-6 border-b pb-4">
                <div>
                  <h2 className="text-xl font-bold text-slate-800">{selectedCategory} Packing Catalog Base</h2>
                  <p className="text-slate-500 text-sm">Select items to populate your master order configuration sheet</p>
                </div>
                <div className="bg-slate-100 px-4 py-2 rounded-lg text-sm font-semibold text-slate-700">
                  {selectedItems.length} Selected
                </div>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {INVENTORY[selectedCategory].map(item => {
                  const isPicked = selectedItems.some(i => i.id === item.id);
                  return (
                    <div key={item.id} className={`p-5 rounded-xl border flex flex-col justify-between ${isPicked ? "border-blue-500 bg-blue-50/50" : "border-slate-200"}`}>
                      <div>
                        <div className="flex justify-between items-start gap-2">
                          <div className="space-y-1">
                            <h3 className="font-bold text-slate-800 text-base">{item.name}</h3>
                            <p className="text-xs text-slate-400 font-medium">{item.desc}</p>
                          </div>
                          <span className="bg-slate-200 text-xs font-bold px-2 py-1 rounded shrink-0">₹{item.rate.toFixed(2)}</span>
                        </div>
                      </div>
                      <button
                        onClick={() => toggleItemSelection(item)}
                        className={`mt-4 w-full py-2 rounded-lg text-sm font-semibold transition-all ${
                          isPicked ? "bg-red-500 hover:bg-red-600 text-white" : "bg-slate-800 hover:bg-slate-900 text-white"
                        }`}
                      >
                        {isPicked ? "Remove Item" : "Add to Order Sheet"}
                      </button>
                    </div>
                  );
                })}
              </div>

              {selectedItems.length > 0 && (
                <div className="mt-8 pt-4 border-t text-center">
                  <button 
                    onClick={() => setScreen(2)}
                    className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3.5 rounded-xl shadow-md transition-all text-lg"
                  >
                    Proceed to PDF Document View & Edit →
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* SCREEN 2: DUAL EDIT PANEL & LIVE A4 SHEET PREVIEW */}
      {screen === 2 && (
        <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 items-start fade-in">
          
          {/* EDITOR SIDEBAR (LEFT) */}
          <div className="xl:col-span-4 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6 max-h-[85vh] overflow-y-auto sticky top-4">
            <div className="flex justify-between items-center border-b pb-3">
              <h2 className="text-lg font-bold text-slate-800">Live Customization Panel</h2>
              <button onClick={() => setScreen(1)} className="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold px-3 py-1.5 rounded-lg border flex items-center gap-1 transition-all">
                ← Back to Catalog
              </button>
            </div>

            <div className="space-y-4">
              <div className="grid grid-cols-3 gap-2">
                <div className="col-span-1">
                  <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1">PO Number</label>
                  <input type="text" value={poNumber} onChange={(e) => setPoNumber(e.target.value)} className="w-full border rounded-lg p-2 text-xs bg-slate-50 font-medium" />
                </div>
                <div>
                  <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1">Order Date</label>
                  <input type="date" value={orderDate} onChange={(e) => setOrderDate(e.target.value)} className="w-full border rounded-lg p-2 text-xs bg-slate-50" />
                </div>
                <div>
                  <label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1">Due Date</label>
                  <input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full border rounded-lg p-2 text-xs bg-slate-50" />
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Adjustable GST Rate (%)</label>
                <input type="number" min="0" max="100" value={gstPercentage} onChange={(e) => setGstPercentage(Number(e.target.value))} className="w-full border rounded-lg p-2.5 text-sm bg-slate-50" />
              </div>
            </div>

            <div className="border-t pt-4 space-y-4">
              <h3 className="text-sm font-bold text-slate-700">Pouch Metric Allocation Overrides</h3>
              {selectedItems.map(item => (
                <div key={item.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100 space-y-2">
                  <div className="text-xs font-bold text-slate-700 truncate">{item.name}</div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-[10px] uppercase font-bold text-slate-400">Quantity</label>
                      <input type="number" step="1000" min="1" value={item.qty} onChange={(e) => handleLiveFieldUpdate(item.id, "qty", e.target.value)} className="w-full border bg-white rounded p-1 text-xs font-mono font-bold" />
                    </div>
                    <div>
                      <label className="block text-[10px] uppercase font-bold text-slate-400">Rate (Each)</label>
                      <input type="number" step="0.01" min="0" value={item.rate} onChange={(e) => handleLiveFieldUpdate(item.id, "rate", e.target.value)} className="w-full border bg-white rounded p-1 text-xs font-mono" />
                    </div>
                  </div>
                </div>
              ))}
            </div>

            <div className="flex gap-2">
              <button onClick={() => setScreen(1)} className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-3 rounded-xl transition-all text-sm text-center">
                ← Cancel
              </button>
              <button 
                onClick={saveBillToWebsiteDatabase}
                className="flex-[2] bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow transition-all flex items-center justify-center gap-2 text-sm"
              >
                💾 Save to Local History Log
              </button>
            </div>
          </div>

          {/* VISUAL PAPER SHEET PREVIEW CONTAINER (RIGHT) */}
          <div className="xl:col-span-8 overflow-x-auto p-4 bg-slate-500 rounded-2xl border border-slate-600 shadow-inner">
            <div id="printable-po-document" className="pdf-preview-sheet text-slate-800 flex flex-col justify-between" style={{padding: '15mm', height: '297mm', fontSize: '12px', lineHeight: '1.5'}}>
              
              <div style={{display: 'flex', flexDirection: 'column', gap: '15px'}}>
                <div className="w-full flex justify-between items-center border-b-2 border-slate-900 pb-2">
                  <img src={logoUrl} alt="Company Identity" className="object-contain" style={{height: '75px', maxWidth: '150px'}} onError={(e)=>{e.target.style.display='none'}} />
                  <div className="text-right">
                    <h1 className="text-2xl font-black tracking-tight text-slate-900 uppercase">PURCHASE ORDER</h1>
                    <div className="text-xs font-mono text-slate-500 mt-0.5">Category: {selectedCategory} Stack</div>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4 border-b border-slate-200 pb-3 items-start">
                  <div>
                    <div className="text-xs text-slate-700 space-y-0.5">
                      <div><span className="font-bold text-slate-900">PO Reference:</span> {poNumber}</div>
                      <div><span className="font-bold text-slate-900">Order Date:</span> {orderDate}</div>
                      <div><span className="font-bold text-slate-900">Due Date:</span> {dueDate}</div>
                    </div>

                    <div className="mt-3">
                      <div className="text-[10px] uppercase tracking-wider font-extrabold text-blue-700 mb-0.5">Purchaser / Bill From:</div>
                      <div className="text-sm font-bold text-slate-900">{companyAddress.name}</div>
                      <div className="text-[11px] text-slate-600 leading-normal mt-0.5">
                        {companyAddress.details}<br />
                        {companyAddress.city}<br />
                        <span className="font-semibold text-slate-800">GSTIN/UIN:</span> {companyAddress.gst}<br />
                        <span className="font-semibold text-slate-800">State:</span> {companyAddress.state}<br />
                        <span className="font-semibold text-slate-800">E-Mail:</span> {companyAddress.email}
                      </div>
                    </div>
                  </div>

                  <div className="text-right flex flex-col items-end">
                    <div className="w-full text-right">
                      <div className="text-[10px] uppercase tracking-wider font-extrabold text-emerald-700 mb-0.5">Deliver To:</div>
                      <div className="text-sm font-bold text-slate-900">{DELIVERY_RAMADEVI.name}</div>
                      <div className="text-[11px] text-slate-600 leading-normal mt-0.5">
                        {DELIVERY_RAMADEVI.details}<br />
                        {DELIVERY_RAMADEVI.city}<br />
                        <span className="font-semibold text-slate-800">Email:</span> {DELIVERY_RAMADEVI.email}<br />
                        <span className="font-semibold text-slate-800">Phone:</span> {DELIVERY_RAMADEVI.phone}<br />
                        <span className="font-semibold text-slate-800">GST:</span> {DELIVERY_RAMADEVI.gst}<br />
                        <span className="font-semibold text-slate-800">State:</span> {DELIVERY_RAMADEVI.state}
                      </div>
                    </div>
                  </div>
                </div>

                <div style={{marginTop: '5px'}}>
                  <table className="w-full text-sm text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-900 text-white uppercase text-[10px] tracking-wider">
                        <th className="p-2.5 font-bold">Line</th>
                        <th className="p-2.5 font-bold">Pouch Packaging Description</th>
                        <th className="p-2.5 text-right font-bold">Quantity</th>
                        <th className="p-2.5 text-right font-bold">Rate</th>
                        <th className="p-2.5 text-right font-bold">Net Subtotal</th>
                      </tr>
                    </thead>
                    <tbody>
                      {selectedItems.map((item, idx) => (
                        <tr key={item.id} className="border-b border-slate-200">
                          <td className="p-2.5 text-slate-500 font-mono">{idx + 1}</td>
                          <td className="p-2.5 text-slate-900"><div className="font-bold">{item.name}</div><div className="text-[10px] text-slate-500 font-medium mt-0.5">{item.desc}</div></td>
                          <td className="p-2.5 text-right font-mono font-bold text-slate-900">{item.qty.toLocaleString()}</td>
                          <td className="p-2.5 text-right font-mono text-slate-600">₹{item.rate.toFixed(2)}</td>
                          <td className="p-2.5 text-right font-mono font-bold text-slate-900">₹{(item.qty * item.rate).toFixed(2)}</td>
                        </tr>
                      ))}

                      <tr className="border-t-2 border-slate-900 bg-slate-50">
                        <td colSpan="2" className="p-2.5 font-bold text-slate-600 uppercase text-[10px]">Total Quantity</td>
                        <td className="p-2.5 text-right font-mono font-black text-slate-900 text-sm">{totalQuantitySum.toLocaleString()}</td>
                        <td colSpan="2" className="p-2.5"></td>
                      </tr>

                      <tr>
                        <td colSpan="3" className="p-2"></td>
                        <td className="p-2 text-right font-bold text-slate-500 uppercase text-[10px]">Taxable Subtotal</td>
                        <td className="p-2 text-right font-mono font-bold text-slate-900">₹{subtotalSum.toFixed(2)}</td>
                      </tr>
                      <tr>
                        <td colSpan="3" className="p-2"></td>
                        <td className="p-2 text-right font-bold text-slate-500 uppercase text-[10px]">Integrated GST ({gstPercentage}%)</td>
                        <td className="p-2 text-right font-mono font-bold text-slate-900">₹{calculatedGst.toFixed(2)}</td>
                      </tr>
                      <tr className="bg-slate-100 text-slate-900 font-semibold">
                        <td colSpan="3" className="p-2.5"></td>
                        <td className="p-2.5 text-right font-extrabold uppercase tracking-wider text-[11px] border-y border-slate-300">Total Order Value</td>
                        <td className="p-2.5 text-right font-mono font-black text-sm text-slate-900 border-y border-slate-300">
                          ₹{grandTotalSum.toFixed(2)}
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>

              </div>

              <div className="grid grid-cols-2 gap-6 pt-3 border-t-2 border-dashed border-slate-200 items-end">
                <div>
                  <div className="text-[10px] font-mono text-slate-400">Generated via Spectal Digi Print System</div>
                  <div className="text-[10px] text-slate-500 font-semibold mt-0.5">Company Reference: {companyAddress.name}</div>
                </div>
                <div className="text-right">
                  <div className="inline-block border-t border-slate-900 w-44 pt-1 text-center text-xs font-bold text-slate-700">
                    Authorized Signatory
                  </div>
                </div>
              </div>

            </div>
          </div>

        </div>
      )}

      {/* STORAGE SYSTEM DATABASE LOG */}
      <div className="mt-12 bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b pb-4 mb-4">
          <div>
            <h2 className="text-xl font-bold text-slate-900">💾 Stored Local Order History Database</h2>
            <p className="text-slate-500 text-sm mt-0.5">Click actions to extract high-resolution device PDF records.</p>
          </div>
          {orderHistory.length > 0 && (
            <button 
              onClick={clearHistoryLog}
              className="bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold px-4 py-2 rounded-xl transition-all"
            >
              Clear Storage Log
            </button>
          )}
        </div>

        {orderHistory.length === 0 ? (
          <div className="text-center py-12 text-slate-400 text-sm border-2 border-dashed rounded-xl">
            No saved orders found in this session database. Finalize adjustments to catalog sheets to archive entries here.
          </div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-left text-sm border-collapse">
              <thead>
                <tr className="bg-slate-50 text-slate-500 uppercase text-[10px] tracking-wider border-b">
                  <th className="p-3 font-bold">PO Reference</th>
                  <th className="p-3 font-bold">Creation Date</th>
                  <th className="p-3 font-bold">Material Category</th>
                  <th className="p-3 font-bold">Supplier Plant Destination</th>
                  <th className="p-3 text-right font-bold">Gross Order Value</th>
                  <th className="p-3 text-center font-bold">Actions</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {orderHistory.map(log => (
                  <tr key={log.id} className="hover:bg-slate-50/80 transition-colors">
                    <td className="p-3 font-mono font-bold text-slate-900">{log.poNum}</td>
                    <td className="p-3 text-slate-600 text-xs">{log.date}</td>
                    <td className="p-3"><span className="bg-blue-50 text-blue-700 font-bold text-xs px-2.5 py-1 rounded-full">{log.category}</span></td>
                    <td className="p-3 text-slate-700 text-xs font-medium max-w-xs truncate">{log.vendorName}</td>
                    <td className="p-3 text-right font-mono font-bold text-emerald-700">₹{log.total}</td>
                    <td className="p-3 text-center">
                      <button 
                        onClick={() => downloadSavedPdfFromLog(log)}
                        className="inline-flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-3 py-1.5 rounded-lg shadow-sm transition-all"
                      >
                        📥 Download PDF File
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>

</body>
</html>
