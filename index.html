.from('pouch_order_history')
.select('*')
.order('id', { ascending: false });

}));

}

return { ...item, boxes, computedQty, lineNet };
});
return { processedItems, totalBoxes, totalQty, subtotal };

<div className="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-6 border-b pb-4">
<div>
<h2 className="text-xl font-bold text-slate-800">{selectedCategory} Packing Catalog Base</h2>
<p className="text-slate-500 text-sm">Select items to populate your master order configuration sheet</p>
</div>
<div className="bg-slate-100 px-4 py-2 rounded-lg text-sm font-semibold text-slate-700 self-start sm:self-auto">{selectedItems.length} Selected</div>
</div>
<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
{INVENTORY[selectedCategory].map(item => {
const isPicked = selectedItems.some(i => i.id === item.id);
return (
<div key={item.id} className={`p-5 rounded-xl border flex flex-col justify-between ${isPicked ? "border-blue-500 bg-blue-50/50" : "border-slate-200"}`}>
<div className="space-y-1">
<div className="flex justify-between items-start gap-2">
<h3 className="font-bold text-slate-800 text-base">{item.name}</h3>
<span className="bg-slate-200 text-xs font-bold px-2 py-1 rounded shrink-0">₹{item.rate.toFixed(2)}</span>
</div>
<p className="text-xs text-slate-400 font-medium">{item.desc}</p>
</div>
<button onClick={() => toggleItemSelection(item)} className={`mt-4 w-full py-2 rounded-lg text-sm font-semibold transition-all ${isPicked ? "bg-red-500 hover:bg-red-600 text-white" : "bg-slate-800 hover:bg-slate-900 text-white"}`}>
{isPicked ? "Remove Item" : "Add to Order Sheet"}
</button>
</div>
);
})}
</div>
{selectedItems.length > 0 && (
<div className="mt-8 pt-4 border-t text-center">
<button onClick={() => setScreen(2)} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-3.5 rounded-xl shadow-md transition-all text-lg w-full sm:w-auto">Proceed to PDF Document View & Edit →</button>
</div>
)}
</div>
)}
</div>
)}

{screen === 2 && (
<div className="grid grid-cols-1 xl:grid-cols-12 gap-6 lg:gap-8 items-start fade-in">
<div className="xl:col-span-4 bg-white p-4 sm:p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6 max-h-[85vh] overflow-y-auto sticky top-4">
<h2 className="text-lg font-bold text-slate-800 border-b pb-2">Live Customization Panel</h2>
<div className="space-y-4">
<div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
<div>
<label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1">PO Number</label>
<input type="text" value={poNumber} onChange={(e) => setPoNumber(e.target.value)} className="w-full border rounded-lg p-2 text-xs bg-slate-50 font-medium" />
</div>
<div>
<label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1">Order Date</label>
<input type="date" value={orderDate} onChange={(e) => setOrderDate(e.target.value)} className="w-full border rounded-lg p-2 text-xs bg-slate-50" />
</div>
<div>
<label className="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1">Due Date</label>
<input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full border rounded-lg p-2 text-xs bg-slate-50" />
</div>
</div>
<div>
<label className="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1">Adjustable GST Rate (%)</label>
<input type="number" min="0" max="100" value={gstPercentage} onChange={(e) => setGstPercentage(Number(e.target.value))} className="w-full border rounded-lg p-2.5 text-sm bg-slate-50" />
</div>
</div>

<div className="border-t pt-4 space-y-4">
<h3 className="text-sm font-bold text-slate-700">Pouch Metric Allocation Overrides</h3>
{selectedItems.map(item => (
<div key={item.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100 space-y-2 relative">
<div className="flex justify-between items-center pr-16">
<div className="text-xs font-bold text-slate-700 truncate">{item.name}</div>
<button onClick={() => setSelectedItems(selectedItems.filter(i => i.id !== item.id))} className="absolute right-2 top-2 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-[10px] font-bold px-2 py-0.5 rounded transition-all">❌ Remove</button>
</div>
<div className="grid grid-cols-2 gap-2">
<div>
<label className="block text-[10px] uppercase font-bold text-slate-400">{inputLabelHeading}</label>
<input type="number" step="1" min="1" value={item.qty} onChange={(e) => handleLiveFieldUpdate(item.id, "qty", e.target.value)} className="w-full border bg-white rounded p-1 text-xs font-mono font-bold" />
</div>
<div>
<label className="block text-[10px] uppercase font-bold text-slate-400">Rate (Each Unit)</label>
<input type="number" step="0.01" min="0" value={item.rate} onChange={(e) => handleLiveFieldUpdate(item.id, "rate", e.target.value)} className="w-full border bg-white rounded p-1 text-xs font-mono" />
</div>
</div>
</div>
))}
</div>

<div className="flex gap-2 pt-2">
<button onClick={() => setScreen(1)} className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-3 rounded-xl transition-all text-sm text-center">← Cancel</button>
<button onClick={saveBillToWebsiteDatabase} className="flex-[2] bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow transition-all flex items-center justify-center gap-2 text-sm">💾 Save Live to Cloud Database</button>
</div>
<div className="pt-2 border-t">
<button onClick={triggerDocumentPrintDownload} disabled={selectedItems.length===0} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 text-sm disabled:opacity-50">📥 Download One-Page PDF</button>
</div>
</div>

<div className="xl:col-span-8 overflow-x-auto p-4 bg-slate-500 rounded-2xl border border-slate-600 shadow-inner flex justify-center">
<div className="min-w-[210mm] scale-75 sm:scale-90 md:scale-100 origin-top transform transition-all">
<div id="printable-po-document" className="pdf-preview-sheet text-slate-800 flex flex-col justify-between" style={{padding: '40px 45px', height: '1115px', fontSize: '11px', lineHeight: '1.4', position: 'relative'}}>
<div style={{width: '100%'}}>
<div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '2px solid #0f172a', paddingBottom: '10px', marginBottom: '12px'}}>
<img src={logoUrl} alt="Company Identity" style={{height: '52px', maxWidth: '135px', objectFit: 'contain'}} />
<div className="text-right">
<h1 className="text-xl font-black tracking-tight text-slate-900 uppercase m-0">PURCHASE ORDER</h1>
<div className="text-[10px] font-mono text-slate-500 mt-0.5">Category: {selectedCategory} Stack</div>
</div>
</div>

<div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '18px', borderBottom: '1px solid #e2e8f0', paddingBottom: '10px'}}>
<div style={{width: '50%', textAlign: 'left'}}>
<div className="text-[11px] text-slate-700 space-y-0.5">
<div><span className="font-bold text-slate-900">PO Reference:</span> {poNumber}</div>
<div><span className="font-bold text-slate-900">Order Date:</span> {orderDate}</div>
<div><span className="font-bold text-slate-900">Due Date:</span> {dueDate}</div>
</div>
<div className="mt-2">
<div className="text-[9px] uppercase tracking-wider font-extrabold text-blue-700 mb-0.5">Purchaser / Bill From:</div>
<div className="text-xs font-bold text-slate-900">{companyAddress.name}</div>
<div className="text-[10px] text-slate-600 leading-tight mt-0.5 whitespace-pre-line">
{companyAddress.details}<br />
{companyAddress.city}<br />
<span className="font-semibold text-slate-800">GSTIN/UIN:</span> {companyAddress.gst}<br />
<span className="font-semibold text-slate-800">State:</span> {companyAddress.state}<br />
<span className="font-semibold text-slate-800">E-Mail:</span> {companyAddress.email}
</div>
</div>
</div>
<div style={{width: '50%', textAlign: 'right'}}>
<div className="text-[9px] uppercase tracking-wider font-extrabold text-emerald-700 mb-0.5">Deliver To:</div>
<div className="text-xs font-bold text-slate-900">{DELIVERY_RAMADEVI.name}</div>
<div className="text-[10px] text-slate-600 leading-tight mt-0.5">
{DELIVERY_RAMADEVI.details}<br />
{DELIVERY_RAMADEVI.city}<br />
<span className="font-semibold text-slate-800">Email:</span> {DELIVERY_RAMADEVI.email}<br />
<span className="font-semibold text-slate-800">Phone:</span> {DELIVERY_RAMADEVI.phone}<br />
<span className="font-semibold text-slate-800">GST:</span> {DELIVERY_RAMADEVI.gst}<br />
<span className="font-semibold text-slate-800">State:</span> {DELIVERY_RAMADEVI.state}
</div>
</div>
</div>

<table className="w-full text-xs text-left border-collapse" style={{width: '100%'}}>
<thead>
<tr className="bg-slate-900 text-white uppercase text-[9px] tracking-wider">
<th className="p-2 font-bold border border-slate-900">S.No.</th>
<th className="p-2 font-bold border border-slate-900">Item Description</th>
{isJarMode && <th className="p-2 text-right font-bold border border-slate-900">Boxes</th>}
<th className="p-2 text-right font-bold border border-slate-900">Quantity</th>
<th className="p-2 text-right font-bold border border-slate-900">Rate</th>
<th className="p-2 text-right font-bold border border-slate-900">Amount</th>
</tr>
</thead>
<tbody>
{calculatedMetrics.processedItems.map((item, idx) => (
<tr key={item.id} className="border-b border-slate-200">
<td className="p-2 text-slate-500 font-mono border border-slate-200">{idx + 1}</td>
<td className="p-2 text-slate-900 border border-slate-200"><div className="font-bold">{item.name}</div><div className="text-[9px] text-slate-500 font-medium mt-0.5">{item.desc}</div></td>
{isJarMode && <td className="p-2 text-right font-mono font-bold text-slate-900 border border-slate-200">{item.boxes.toLocaleString()} Boxes</td>}
<td className="p-2 text-right font-mono font-bold text-slate-900 border border-slate-200">{item.computedQty.toLocaleString()} Pcs</td>
<td className="p-2 text-right font-mono text-slate-600 border border-slate-200">₹{item.rate.toFixed(2)}</td>
<td className="p-2 text-right font-mono font-bold text-slate-900 border border-slate-200">₹{item.lineNet.toFixed(2)}</td>
</tr> ))}
<tr className="bg-slate-50 font-bold">
<td colSpan="2" className="p-2 font-bold text-slate-600 uppercase text-[9px] border border-slate-200">Total</td>
{isJarMode && <td className="p-2 text-right font-mono font-black text-slate-900 text-xs border border-slate-200">{calculatedMetrics.totalBoxes.toLocaleString()} Boxes</td>}
<td className="p-2 text-right font-mono font-black text-slate-900 text-xs border border-slate-200">{calculatedMetrics.totalQty.toLocaleString()} Pcs</td>
<td colSpan="2" className="p-2 border border-slate-200"></td>
</tr>
<tr>
<td colSpan={isJarMode ? 4 : 3} className="p-2 text-right font-bold text-slate-500 uppercase text-[9px]">Taxable Subtotal</td>
<td colSpan="2" className="p-1.5 text-right font-mono font-bold text-slate-900 border border-slate-200">₹{calculatedMetrics.subtotal.toFixed(2)}</td>
</tr>
<tr>
<td colSpan={isJarMode ? 4 : 3} className="p-2 text-right font-bold text-slate-500 uppercase text-[9px]">Integrated GST ({gstPercentage}%)</td>
<td colSpan="2" className="p-1.5 text-right font-mono font-bold text-slate-900 border border-slate-200">₹{calculatedGst.toFixed(2)}</td>
</tr>
<tr className="bg-slate-100 text-slate-900">
<td colSpan={isJarMode ? 4 : 3} className="p-2 text-right font-bold uppercase tracking-wider text-[10px]">Total Order Value</td>
<td colSpan="2" className="p-2 text-right font-mono text-xs text-slate-900 border border-slate-200">
₹{grandTotalSum.toFixed(2)}
</td>
</tr>
</tbody>
</table>
</div>

<div style={{position: 'absolute', bottom: '40px', left: '45px', right: '45px', borderTop: '2px dashed #cbd5e1', paddingTop: '10px'}}>
<table style={{width: '100%', borderCollapse: 'collapse'}}>
<tr>
<td style={{verticalAlign: 'bottom', width: '60%', textAlign: 'left'}}>
<div className="text-[10px] font-bold text-slate-700 text-transform: uppercase;">This is a computer-generated document.</div>
<div className="text-[8px] font-mono text-slate-400 mt-1">System Ref: SPECTAL-PACK-AUTOMATION</div>
</td>
<td style={{textAlign: 'right', verticalAlign: 'bottom', width: '40%'}}>
<div className="inline-block border-t border-slate-900 w-36 pt-1 text-center text-[10px] font-bold text-slate-700">Authorized Signatory</div>
</td>
</tr>
</table>
</div>
</div>
</div>
</div>
</div>
)}

{screen === 1 && (
<div className="mt-12 bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
<div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b pb-4 mb-4">
<div>
<h2 className="text-xl font-bold text-slate-900">🌐 Central Cloud Order History Database</h2>
<p className="text-slate-500 text-sm mt-0.5">Synchronized globally in real-time across all active employee devices.</p>
</div>
{orderHistory.length > 0 && (
<button onClick={clearHistoryLog} className="bg-red-50 hover:bg-red-100 text-red-600 text-xs font-bold px-4 py-2 rounded-xl transition-all">Purge Central Cloud Logs</button>
)}
</div>

{isLoading ? (
<div className="text-center py-12 text-slate-500 text-sm">Querying cloud server infrastructure... Please wait...</div>
) : orderHistory.length === 0 ? (
<div className="text-center py-12 text-slate-400 text-sm border-2 border-dashed rounded-xl">No saved orders found in the central cloud server.</div>
) : (
<div className="overflow-x-auto">
<table className="w-full text-left text-sm border-collapse">
<thead>
<tr className="bg-slate-50 text-slate-500 uppercase text-[10px] tracking-wider border-b">
<th className="p-3 font-bold">PO Reference</th>
<th className="p-3 font-bold">Creation Date</th>
<th className="p-3 font-bold">Material Category</th>
<th className="p-3 font-bold">Supplier Plant Destination</th>
<th className="p-3 text-right font-bold">Gross Order Value</th>
<th className="p-3 text-center font-bold">Actions</th>
</tr>
</thead>
<tbody className="divide-y divide-slate-100">
{orderHistory.map((log, index) => (
<tr key={log.uniqueTimestamp || index} className="hover:bg-slate-50/80 transition-colors">
<td className="p-3 font-mono font-bold text-slate-900">{log.poNum}</td>
<td className="p-3 text-slate-600 text-xs">{log.date}</td>
<td className="p-3"><span className="bg-blue-50 text-blue-700 font-bold text-xs px-2.5 py-1 rounded-full">{log.category}</span></td>
<td className="p-3 text-slate-700 text-xs font-medium max-w-xs truncate">{log.vendorName}</td>
<td className="p-3 text-right font-mono font-bold text-emerald-700">₹{log.total}</td>
<td className="p-3 text-center">
<button onClick={() => downloadSavedPdfFromLog(log)} className="inline-flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-3 py-1.5 rounded-lg shadow-sm transition-all">📥 Download PDF File</button>
</td>
</tr>
))}
</tbody>
</table>
</div>
)}
</div>
)}
</div>
);
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
